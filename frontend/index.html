<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Food Rescue</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div id="app">
        <nav class="navbar navbar-expand-lg navbar-dark bg-success">
            <div class="container">
                <router-link class="navbar-brand fw-bold" to="/">Food Rescue</router-link>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="mainNav">
                    <div class="navbar-nav me-auto">
                        <router-link class="nav-link" to="/listings">Browse</router-link>
                        <router-link class="nav-link" to="/dashboard" v-if="isLoggedIn">Dashboard</router-link>
                        <router-link class="nav-link" to="/reservations" v-if="isLoggedIn">Reservations</router-link>
                        <router-link class="nav-link" to="/my-listings" v-if="role === 'donor'">My Listings</router-link>
                        <router-link class="nav-link" to="/admin" v-if="role === 'admin'">Admin</router-link>
                    </div>
                    <div class="navbar-nav align-items-lg-center">
                        <span class="navbar-text me-3" v-if="user">{{ user.name }} · {{ role }}</span>
                        <router-link class="nav-link" to="/login" v-if="!isLoggedIn">Login</router-link>
                        <router-link class="nav-link" to="/register" v-if="!isLoggedIn">Register</router-link>
                        <button class="btn btn-light btn-sm" @click="logout" v-if="isLoggedIn">Logout</button>
                    </div>
                </div>
            </div>
        </nav>
        <main>
            <router-view></router-view>
        </main>
        <footer class="py-4 border-top mt-5">
            <div class="container text-center text-muted">Community Food Rescue Platform</div>
        </footer>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.7.16/dist/vue.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue-router@3.6.5/dist/vue-router.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.7.9/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/components/Home.js"></script>
    <script src="js/components/Login.js"></script>
    <script src="js/components/Register.js"></script>
    <script src="js/components/Listings.js"></script>
    <script src="js/components/ListingDetails.js"></script>
    <script src="js/components/ManageListing.js"></script>
    <script src="js/components/MyListings.js"></script>
    <script src="js/components/Dashboard.js"></script>
    <script src="js/components/Reservations.js"></script>
    <script src="js/components/AdminDashboard.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
